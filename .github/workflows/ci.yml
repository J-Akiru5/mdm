name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Quality Gate ──────────────────────────────────────────────
  # Runs on every push to main AND every PR targeting main.
  lint-and-build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Semantic Release ──────────────────────────────────────────
  # Runs only on direct pushes to main (not PRs).
  # Analyzes commits since the last release, determines the next
  # version (MAJOR / MINOR / PATCH), updates CHANGELOG.md and
  # package.json, commits them back, tags the release, and creates
  # a GitHub Release — all automatically, no tokens to configure.
  release:
    name: Semantic Release
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write # push version bump commit + tag
      issues: write # comment on issues in release notes
      pull-requests: write # comment on PRs in release notes

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for commit analysis

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
